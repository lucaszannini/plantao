                                                        ))}
                                                        <span className={`px-1.5 py-0.5 rounded shadow-sm ${colorMap[patient.triage]}`}>{colorNamesTriage[patient.triage]}</span>
                                                        <span className={`px-1.5 py-0.5 rounded shadow-sm border border-slate-500 ${colorMap[patient.severity]}`}>Gravidade: {colorNamesSeverity[patient.severity]}</span>
                                                    </div>
                                                </div>

                                                {/* Ações Rápidas */}
                                                <div className="flex gap-0.5 self-start lg:self-auto shrink-0 bg-slate-900/50 p-0.5 rounded border border-slate-700/50">
                                                    <button onClick={() => copyHandoff(patient)} className="text-slate-400 hover:text-emerald-400 hover:bg-slate-800 p-1.5 rounded transition-colors" title="Copiar P/ Passagem de Plantão"><CopyIcon size={14} /></button>
                                                    <button onClick={() => dischargePatient(patient.id)} className="text-slate-400 hover:text-green-400 hover:bg-slate-800 p-1.5 rounded transition-colors" title="Dar Alta"><UserCheck size={14} /></button>
                                                    <button onClick={() => declareDeath(patient.id)} className="text-slate-400 hover:text-red-500 hover:bg-slate-800 p-1.5 rounded transition-colors" title="Registrar Óbito"><HeartOff size={14} /></button>
                                                    <button onClick={() => handleEdit(patient)} className="text-slate-400 hover:text-blue-400 hover:bg-slate-800 p-1.5 rounded transition-colors" title="Editar"><Edit size={14} /></button>
                                                </div>
                                            </div>

                                            {/* Aguarda Fixo */}
                                            {patient.waiting && (
                                                <div className="bg-orange-900/10 p-2 rounded border border-orange-800/30 w-full min-w-0">
                                                    <span className="block text-[10px] font-bold text-orange-500 mb-0.5">Aguarda:</span>
                                                    <span className="text-orange-200 font-medium text-[11px] whitespace-pre-wrap break-all">{patient.waiting}</span>
                                                </div>
                                            )}

                                            {/* Acordeão */}
                                            {hasClinicalData && (
                                                <button onClick={() => toggleExpand(patient.id)} className={`w-full flex items-center justify-center gap-1 text-[10px] uppercase tracking-wider font-bold py-1 rounded transition-colors border border-dashed ${isExpanded ? 'bg-slate-800 border-slate-600 text-slate-400 hover:bg-slate-700/50' : 'bg-slate-900/40 border-slate-700 text-slate-500 hover:text-slate-300 hover:bg-slate-700/30'}`}>
                                                    {isExpanded ? <ChevronUp size={12} /> : <ChevronDown size={12} />} {isExpanded ? 'Ocultar Evolução' : 'Ver Detalhes Clínicos'}
                                                </button>
                                            )}

                                            {/* Conteúdo do Acordeão */}
                                            {isExpanded && hasClinicalData && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 animate-fadeIn text-[11px]">
                                                    {patient.vitals && (
                                                        <div className="bg-emerald-900/20 p-2 rounded border border-emerald-800/30 min-w-0 lg:col-span-full">
                                                            <span className="block text-[10px] font-bold text-emerald-400 mb-0.5">Sinais Vitais</span>
                                                            <span className="text-emerald-100 whitespace-pre-wrap break-all">{patient.vitals}</span>
                                                        </div>
                                                    )}
                                                    {patient.diagnosis && (
                                                        <div className="bg-slate-900/80 p-2 rounded border border-slate-700/50 min-w-0">
                                                            <span className="block text-[10px] font-semibold text-slate-400 mb-0.5">Diagnóstico</span>
                                                            <span className="text-slate-200 whitespace-pre-wrap break-all">{patient.diagnosis}</span>
                                                        </div>
                                                    )}
                                                    {patient.exams && (
                                                        <div className="bg-slate-900/80 p-2 rounded border border-slate-700/50 min-w-0">
                                                            <span className="block text-[10px] font-semibold text-slate-400 mb-0.5">Exames</span>
                                                            <span className="text-slate-200 whitespace-pre-wrap break-all">{patient.exams}</span>
                                                        </div>
                                                    )}
                                                    {patient.meds && (
                                                        <div className="bg-slate-900/80 p-2 rounded border border-slate-700/50 min-w-0">
                                                            <span className="block text-[10px] font-semibold text-slate-400 mb-0.5">Medicações</span>
                                                            <span className="text-slate-200 whitespace-pre-wrap break-all">{patient.meds}</span>
                                                        </div>
                                                    )}
                                                    {patient.observations && (
                                                        <div className="bg-slate-900/80 p-2 rounded border border-slate-700/50 lg:col-span-full min-w-0">
                                                            <span className="block text-[10px] font-semibold text-slate-400 mb-0.5">Observações</span>
                                                            <span className="text-slate-200 italic whitespace-pre-wrap break-all">{patient.observations}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
